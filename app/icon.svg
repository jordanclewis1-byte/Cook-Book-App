<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Open book -->
  <rect x="2" y="7" width="13" height="18" rx="2" fill="#9f4f2b"/>
  <rect x="17" y="7" width="13" height="18" rx="2" fill="#9f4f2b"/>
  <!-- Spine -->
  <rect x="14" y="7" width="4" height="18" rx="1" fill="#7f3d1f"/>
  <!-- Left page lines -->
  <line x1="5" y1="13" x2="12" y2="13" stroke="#fffaf2" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="17" x2="12" y2="17" stroke="#fffaf2" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="21" x2="10" y2="21" stroke="#fffaf2" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right page lines -->
  <line x1="20" y1="13" x2="27" y2="13" stroke="#fffaf2" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="17" x2="27" y2="17" stroke="#fffaf2" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="21" x2="25" y2="21" stroke="#fffaf2" stroke-width="1.5" stroke-linecap="round"/>
</svg>
